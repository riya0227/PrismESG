<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ESG Platform</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow-x: hidden;
        }

        /* NAVBAR */
        .top-navbar {
            height: 60px;
            background: white;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: fixed;
            width: 100%;
            z-index: 1000;
        }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            top: 60px;
            left: 0;
            background-color: #1f2933;
            padding: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .sidebar.collapsed {
            margin-left: -250px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px 0;
        }

        .sidebar a:hover {
            background-color: #374151;
            padding-left: 10px;
            transition: 0.2s;
        }

        /* MAIN CONTENT */
        .main-content {
            margin-left: 250px;
            margin-top: 60px;
            padding: 30px;
            transition: all 0.3s ease;
        }

        .main-content.expanded {
            margin-left: 0;
        }

        .toggle-btn {
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- TOP NAVBAR -->
<div class="top-navbar">

    <!-- Left -->
    <div class="d-flex align-items-center">
        <i class="bi bi-list toggle-btn me-3" onclick="toggleSidebar()"></i>
        <h5 class="mb-0">ESG Intelligence Platform</h5>
    </div>

    <!-- Right -->
    <div class="dropdown">
        <a class="d-flex align-items-center text-decoration-none dropdown-toggle"
           href="#" role="button" data-bs-toggle="dropdown">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                 width="35" height="35"
                 class="rounded-circle me-2">
            <strong>Riya</strong>
        </a>

        <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#">Profile</a></li>
            <li><a class="dropdown-item" href="#">Settings</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#">Logout</a></li>
        </ul>
    </div>

</div>

<!-- SIDEBAR -->
<div class="sidebar">

    <div>
        <a href="{% url 'dashboard' %}">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a href="{% url 'upload_report' %}">
            <i class="bi bi-upload"></i> Upload Report
        </a>

        <a href="{% url 'report_list' %}">
            <i class="bi bi-file-earmark-text"></i> Reports
        </a>

        <a href="{% url 'analytics' %}">
            <i class="bi bi-bar-chart"></i> Analytics
        </a>
    </div>

</div>

<!-- MAIN CONTENT -->
<div class="main-content">
    {% block content %}
    {% endblock %}
</div>

<!-- JS -->
<script>
function toggleSidebar() {
    document.querySelector(".sidebar").classList.toggle("collapsed");
    document.querySelector(".main-content").classList.toggle("expanded");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
