{% extends "dashboard/base.html" %}

{% block content %}

<div class="container-fluid">

    <h2 class="mb-4">Upload ESG Report</h2>

    <div class="row">

        <!-- LEFT SIDE : UPLOAD CARD -->
        <div class="col-md-7">

            <div class="card shadow-sm">
                <div class="card-body">

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Report Title</label>
                            <input type="text"
                                   name="title"
                                   class="form-control"
                                   placeholder="Enter report title"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Upload ESG Report (PDF)</label>
                            <input type="file"
                                   name="pdf_file"
                                   class="form-control"
                                   required>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            Upload Report
                        </button>

                    </form>

                </div>
            </div>

        </div>

        <!-- RIGHT SIDE : INFO PANEL -->
        <div class="col-md-5">

            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Upload Guidelines</h5>
                    <ul class="mt-3">
                        <li>Upload ESG or Sustainability reports</li>
                        <li>PDF format only</li>
                        <li>Maximum size: 20MB</li>
                        <li>Reports will be analyzed automatically</li>
                    </ul>
                </div>
            </div>

        </div>

    </div>

</div>

{% endblock %}
