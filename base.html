<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ESG Platform</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    

    <style>
        body {
            margin: 0;
        }

        .sidebar {
            width: 250px;
            height: 100vh;           /* FULL height */
            position: fixed;         /* FIXED on left */
            top: 0;
            left: 0;
            background-color: #1f2933;
            padding: 20px;
            color: white;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px 0;
        }

        .sidebar a:hover {
            background-color: #374151;
            padding-left: 10px;
            transition: 0.2s;
        }

        .main-content {
            margin-left: 250px;      /* Push content right */
            padding: 30px;
        }
    </style>
</head>

<body>


    <!-- SIDEBAR -->
    <div class="sidebar">
        <h4 class="mb-4">ESG Platform</h4>

        <a href="/dashboard/">Dashboard</a>
        <a href="/upload/">Upload Report</a>
        <a href="/reports/">Reports</a>
        <a href="#">Analytics</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
